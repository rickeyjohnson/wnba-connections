<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WNBA Connections</title>
</head>
<body>
    <div id="header">
        <div id="logo-title">
            <img src="" alt="wnba logo">
            WNBA Connections
        </div>
        <button id="new-game">new game</button>
    </div>
    <div id="content">
        <div id="game-subtitle" class="subtitle">Create four groups of four!</div>
        <div id="cards-container">
            <button class="card">1</button>
            <button class="card">2</button>
            <button class="card">3</button>
            <button class="card">4</button>
            <button class="card">5</button>
            <button class="card">6</button>
            <button class="card">7</button>
            <button class="card">8</button>
            <button class="card">9</button>
            <button class="card">10</button>
            <button class="card">11</button>
            <button class="card">12</button>
            <button class="card">13</button>
            <button class="card">14</button>
            <button class="card">15</button>
            <button class="card">16</button>
        </div>
        <div id="mistakes-container">
            <div id=mistakes-subtitle" class="subtitle">Mistakes remaining:</div>
            <div id="mistakes">* * * *</div>
        </div>
        <div id="game-controls-container">
            <button id="shuffle" class="game-control-button">Shuffle</button>
            <button id="deselect" class="game-control-button">Deselect All</button>
            <button id="submit" class="game-control-button disable">Submit</button>
        </div>
    </div>
</body>
</html>
