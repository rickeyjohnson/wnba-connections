<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WNBA Connections</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="header">
        <div id="title">WNBA Connections</div>
    </div>
    <div id="content">
        <div id="game-subtitle" class="subtitle">Create four groups of four!</div>
        <div id="cards-container">
            <div class="card">1</div>
            <div class="card">2</div>
            <div class="card">3</div>
            <div class="card">4</div>
            <div class="card">5</div>
            <div class="card">6</div>
            <div class="card">7</div>
            <div class="card selected">8</div>
            <div class="card">9</div>
            <div class="card">10</div>
            <div class="card">11</div>
            <div class="card">12</div>
            <div class="card">13</div>
            <div class="card">14</div>
            <div class="card">15</div>
            <div class="card">16</div>
        </div>
        <div id="mistakes-container">
            <div id=mistakes-subtitle" class="subtitle">Mistakes remaining:</div>
            <div id="mistakes">* * * *</div>
        </div>
        <div id="game-controls-container">
            <button id="shuffle" class="game-control-button">Shuffle</button>
            <button id="deselect" class="game-control-button">Deselect All</button>
            <button id="submit" class="game-control-button disable">Submit</button>
        </div>
    </div>
</body>
</html>
